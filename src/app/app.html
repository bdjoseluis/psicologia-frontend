// y rutas privadas (login, dashboard, admin, etc.)
window.isPublicRoute = function() {
  const path = window.location.pathname;
  return (
    path === '/home' ||
    path === '/' ||
    path.includes('/sobre') ||
    path.includes('/contacto') ||
    path.includes('/horarios')
  );
};
